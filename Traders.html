<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sea Freight Rates</title>
    <!-- Подключаем Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <!-- Подключаем Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Плавные переходы для смены тем */
        body {
            transition: background-color 0.25s ease, color 0.25s ease;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-zinc-950 dark:text-zinc-50 min-h-screen p-4">

    <div class="max-w-md mx-auto space-y-4">
        
        <!-- Шапка -->
        <div class="flex items-center justify-between bg-white dark:bg-zinc-900 p-4 rounded-2xl shadow-sm border border-slate-100 dark:border-zinc-800">
            <div class="flex items-center gap-3">
                <span class="text-2xl">📊</span>
                <div>
                    <h1 class="font-bold text-lg leading-tight">Freight Rates</h1>
                    <p id="date-text" class="text-xs text-slate-400 dark:text-zinc-500">Загрузка тарифов...</p>
                </div>
            </div>
            <!-- Кнопка переключения темы -->
            <button onclick="toggleTheme()" class="px-3 py-1.5 text-xs font-semibold bg-slate-100 dark:bg-zinc-800 hover:bg-slate-200 dark:hover:bg-zinc-700 rounded-full transition-all">
                🌓 Тема
            </button>
        </div>

        <!-- Переключатель вкладок (Heavy / Light) -->
        <div class="grid grid-cols-2 gap-2 p-1 bg-slate-100 dark:bg-zinc-900 rounded-xl">
            <button id="tab-heavy" onclick="switchTab('heavy')" class="py-2.5 text-sm font-bold rounded-lg transition-all bg-white dark:bg-zinc-800 shadow-sm">
                🚢 Heavy (Тяжелый)
            </button>
            <button id="tab-light" onclick="switchTab('light')" class="py-2.5 text-sm font-semibold text-slate-500 dark:text-zinc-400 rounded-lg transition-all hover:bg-white/50 dark:hover:bg-zinc-800/50">
                🌾 Light (Легкий)
            </button>
        </div>

        <!-- Поисковая строка -->
        <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">🔍</span>
            <input type="text" id="search-input" oninput="filterRoutes()" placeholder="Быстрый поиск направления..." class="w-full pl-9 pr-4 py-2.5 text-sm bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-600 transition-all placeholder:text-slate-400">
        </div>

        <!-- Таблицы маршрутов -->
        <div class="space-y-4">
            <!-- Секция МОРСКИЕ СУДА -->
            <div id="sea-section" class="bg-white dark:bg-zinc-900 rounded-2xl p-4 shadow-sm border border-slate-100 dark:border-zinc-800">
                <h2 class="text-xs font-bold text-blue-600 dark:text-blue-400 uppercase tracking-wider mb-3">🚢 МОРСКИЕ СУДА (COASTERS)</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-[11px] font-bold text-slate-400 dark:text-zinc-500 uppercase border-b border-slate-100 dark:border-zinc-800">
                                <th class="pb-2">Направление</th>
                                <th class="pb-2 text-right">3,000т</th>
                                <th class="pb-2 text-right">5-6,000т</th>
                            </tr>
                        </thead>
                        <tbody id="sea-routes-container" class="divide-y divide-slate-100 dark:divide-zinc-800 text-sm">
                            <!-- Морские порты -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Секция РЕЧНЫЕ БАРЖИ -->
            <div id="barge-section" class="bg-white dark:bg-zinc-900 rounded-2xl p-4 shadow-sm border border-slate-100 dark:border-zinc-800">
                <h2 class="text-xs font-bold text-amber-600 dark:text-amber-400 uppercase tracking-wider mb-3">🌾 РЕЧНЫЕ БАРЖИ (BARGES)</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-[11px] font-bold text-slate-400 dark:text-zinc-500 uppercase border-b border-slate-100 dark:border-zinc-800">
                                <th class="pb-2">Направление</th>
                                <th class="pb-2 text-right">3,000т</th>
                                <th class="pb-2 text-right">5-6,000т</th>
                            </tr>
                        </thead>
                        <tbody id="barge-routes-container" class="divide-y divide-slate-100 dark:divide-zinc-800 text-sm">
                            <!-- Речные порты -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Кнопка Скопировать текстом -->
        <button onclick="copyToClipboard()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm rounded-xl shadow-md active:scale-[0.98] transition-all flex items-center justify-center gap-2">
            📋 Скопировать тарифы текстом
        </button>

    </div>

    <script>
        const FLAGS = {
            "CTZ": "🇷🇴 CTZ", "Ruse": "🇧🇬 Ruse", "MRM": "🇹🇷 MRM",
            "ECG": "🇬🇷 ECG", "Creta": "🇬🇷 Creta", "WCG": "🇬🇷 WCG",
            "Mersin": "🇹🇷 Mersin", "Egypt": "🇪🇬 Egypt", "ECI": "🇮🇹 ECI",
            "Benghasi": "🇱🇾 Benghasi", "WCI": "🇮🇹 WCI", "Tunisia": "🇹🇳 Tunisia",
            "UK": "🇬🇧 UK"
        };

        // Разделение портов на группы
        const BARGE_PORTS = ["CTZ", "Ruse"];
        const SEA_PORTS = ["MRM", "ECG", "Creta", "WCG", "Mersin", "Egypt", "ECI", "Benghasi", "WCI", "Tunisia", "UK"];

        let currentCargo = "heavy";
        let ratesData = [];

        // Инициализация WebApp
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // Настройка темы
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && tg && tg.colorScheme === 'dark')) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        // Парсинг переданных тарифов из параметров URL
        function parseUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const dateParam = params.get("d") || "";
            const heavyParam = params.get("h") || "";
            const lightParam = params.get("l") || "";

            if (dateParam) {
                const formattedDate = dateParam.replace("_", " в ");
                document.getElementById("date-text").innerText = `Расчет от: ${formattedDate}`;
            }

            const heavyRates = decodeRates(heavyParam);
            const lightRates = decodeRates(lightParam);

            // Формируем единый массив данных
            ratesData = Object.keys(FLAGS).map(code => {
                const hData = heavyRates.find(r => r.code === code) || { r3k: { price: '—', trend: '', style: '' }, r6k: { price: '—', trend: '', style: '' } };
                const lData = lightRates.find(r => r.code === code) || { r3k: { price: '—', trend: '', style: '' }, r6k: { price: '—', trend: '', style: '' } };
                return {
                    code: code,
                    flag: FLAGS[code] ? FLAGS[code].trim().split(/\s+/)[0] : '🌐',
                    name: FLAGS[code] ? FLAGS[code].trim().split(/\s+/).slice(1).join(' ') : code,
                    heavy: { r3k: hData.r3k, r6k: hData.r6k },
                    light: { r3k: lData.r3k, r6k: lData.r6k }
                };
            });
        }

        function decodeRates(raw) {
            if (!raw) return [];
            return raw.split(',').map(item => {
                const parts = item.split(':');
                const code = parts[0];
                const r3 = parts[1] || '-';
                const r6 = parts[2] || '-';

                const formatCell = (valStr) => {
                    const cleanVal = valStr.trim();
                    if (cleanVal === '-' || !cleanVal) return { price: '—', trend: '', style: 'text-slate-300 dark:text-zinc-700' };
                    
                    const value = cleanVal.slice(0, -1);
                    const trendCode = cleanVal.slice(-1);
                    
                    if (trendCode === 'u') {
                        // Рост — красный текст, плотный красный фон (хорошо читается)
                        return { 
                            price: `$${value}`, 
                            trend: ' 🔺', 
                            style: 'text-red-700 dark:text-red-300 bg-red-100/90 dark:bg-red-950/70 border border-red-200 dark:border-red-900 rounded-lg px-2 py-0.5 font-bold' 
                        };
                    } else if (trendCode === 'd') {
                        // Падение — зеленый текст, плотный зеленый фон
                        return { 
                            price: `$${value}`, 
                            trend: ' 🔻', 
                            style: 'text-green-700 dark:text-green-300 bg-green-100/90 dark:bg-green-950/70 border border-green-200 dark:border-green-900 rounded-lg px-2 py-0.5 font-bold' 
                        };
                    }
                    // Без изменений — стандартный темный/светлый текст
                    return { price: `$${value}`, trend: '', style: 'text-slate-800 dark:text-zinc-200 font-semibold' };
                };

                return {
                    code: code,
                    r3k: formatCell(r3),
                    r6k: formatCell(r6)
                };
            });
        }

        function renderTables() {
            const seaContainer = document.getElementById('sea-routes-container');
            const bargeContainer = document.getElementById('barge-routes-container');

            seaContainer.innerHTML = '';
            bargeContainer.innerHTML = '';

            const searchValue = document.getElementById('search-input').value.toLowerCase().trim();

            ratesData.forEach(item => {
                const matchesSearch = item.name.toLowerCase().includes(searchValue) || item.code.toLowerCase().includes(searchValue);
                if (!matchesSearch) return;

                const currentRates = item[currentCargo];
                const row = document.createElement('tr');
                row.className = 'hover:bg-slate-50/50 dark:hover:bg-zinc-800/30 transition-colors';
                
                row.innerHTML = `
                    <td class="py-3 font-medium">
                        <span class="mr-1.5">${item.flag}</span>${item.name}
                    </td>
                    <td class="py-3 text-right">
                        <span class="${currentRates.r3k.style}">${currentRates.r3k.price}${currentRates.r3k.trend}</span>
                    </td>
                    <td class="py-3 text-right">
                        <span class="${currentRates.r6k.style}">${currentRates.r6k.price}${currentRates.r6k.trend}</span>
                    </td>
                `;

                if (BARGE_PORTS.includes(item.code)) {
                    bargeContainer.appendChild(row);
                } else {
                    seaContainer.appendChild(row);
                }
            });

            // Скрываем или показываем секции целиком, если в них пусто после поиска
            document.getElementById('barge-section').style.display = bargeContainer.children.length > 0 ? 'block' : 'none';
            document.getElementById('sea-section').style.display = seaContainer.children.length > 0 ? 'block' : 'none';
        }

        function switchTab(cargo) {
            currentCargo = cargo;
            const tabHeavy = document.getElementById('tab-heavy');
            const tabLight = document.getElementById('tab-light');

            if (cargo === 'heavy') {
                tabHeavy.className = "py-2.5 text-sm font-bold rounded-lg transition-all bg-white dark:bg-zinc-800 shadow-sm text-slate-900 dark:text-white";
                tabLight.className = "py-2.5 text-sm font-semibold text-slate-500 dark:text-zinc-400 rounded-lg transition-all hover:bg-white/50 dark:hover:bg-zinc-800/50";
            } else {
                tabLight.className = "py-2.5 text-sm font-bold rounded-lg transition-all bg-white dark:bg-zinc-800 shadow-sm text-slate-900 dark:text-white";
                tabHeavy.className = "py-2.5 text-sm font-semibold text-slate-500 dark:text-zinc-400 rounded-lg transition-all hover:bg-white/50 dark:hover:bg-zinc-800/50";
            }
            renderTables();
        }

        function filterRoutes() {
            renderTables();
        }

        // Копирование тарифов в буфер обмена в красивом текстовом формате
        function copyToClipboard() {
            let text = `🚢 Тарифы фрахта — Giurgiulești (${currentCargo === 'heavy' ? 'Heavy / Grain' : 'Light / Sunflower'})\n`;
            text += `📅 ${document.getElementById('date-text').innerText}\n\n`;

            ratesData.forEach(item => {
                const currentRates = item[currentCargo];
                const r3 = currentRates.r3k.price !== '—' ? `${currentRates.r3k.price}${currentRates.r3k.trend}` : '—';
                const r6 = currentRates.r6k.price !== '—' ? `${currentRates.r6k.price}${currentRates.r6k.trend}` : '—';
                
                text += `${item.flag} ${item.name}: 3kт = ${r3} | 5-6kт = ${r6}\n`;
            });

            navigator.clipboard.writeText(text).then(() => {
                if (tg && typeof tg.showPopup === 'function') {
                    tg.showPopup({ message: '📋 Тарифы скопированы в буфер обмена!' });
                } else {
                    alert('📋 Тарифы скопированы в буфер обмена!');
                }
            }).catch(err => {
                console.error('Ошибка копирования:', err);
            });
        }

        // Запуск страницы
        initTheme();
        parseUrlParams();
        renderTables();
    </script>
</body>
</html>
