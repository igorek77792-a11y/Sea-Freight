<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Freight Rates — Giurgiulești</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts Inter для идеальной типографики -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Telegram WebApp JS SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-gradient-start: #f8fafc;
            --bg-gradient-end: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #f1f5f9;
            --accent-color: #3b82f6;
            --accent-hover: #1d4ed8;
            --shadow-sm: 0 2px 8px -1px rgba(0, 0, 0, 0.05), 0 1px 3px -1px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.03);
        }

        /* Автоматическая темная тема Telegram */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-gradient-start: #0f172a;
                --bg-gradient-end: #020617;
                --card-bg: #1e293b;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --border-color: #334155;
                --accent-color: #3b82f6;
                --accent-hover: #60a5fa;
            }
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        .premium-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }

        .tab-transition {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Эффект свечения для активных элементов */
        .active-glow {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.25);
        }
    </style>
</head>
<body class="p-4 min-h-screen pb-12">

    <!-- Шапка дашборда -->
    <div class="mb-6 relative flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-blue-600 to-indigo-600 flex items-center justify-center text-2xl shadow-lg active-glow">
                🚢
            </div>
            <div>
                <h1 class="text-xl font-extrabold tracking-tight leading-none mb-1">Freight Rates</h1>
                <div class="flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Giurgiulești Hub</span>
                </div>
            </div>
        </div>
        <div class="text-right">
            <span class="inline-flex items-center px-2.5 py-1 rounded-full text-[10px] font-bold bg-blue-500/10 text-blue-500 border border-blue-500/20" id="date-label">
                Обновлено: Загрузка...
            </span>
        </div>
    </div>

    <!-- Переключатель грузов (Премиум дизайн) -->
    <div class="flex p-1.5 rounded-2xl bg-slate-200/50 dark:bg-slate-800/40 mb-5 premium-card">
        <button id="btn-heavy" onclick="switchTab('heavy')" class="tab-transition flex-1 py-3 text-center rounded-xl font-bold text-sm flex items-center justify-center gap-2 bg-gradient-to-r from-blue-600 to-indigo-600 text-white shadow-md shadow-blue-500/10">
            <span>🚢</span> Тяжелый груз
        </button>
        <button id="btn-light" onclick="switchTab('light')" class="tab-transition flex-1 py-3 text-center rounded-xl font-bold text-sm flex items-center justify-center gap-2 text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-100">
            <span>🌾</span> Легкий груз
        </button>
    </div>

    <!-- Поиск по направлениям -->
    <div class="mb-6 relative">
        <input type="text" id="search-input" oninput="filterRoutes()" placeholder="Поиск направления или порта..." 
               class="w-full pl-11 pr-4 py-3.5 rounded-2xl border border-slate-200 dark:border-slate-700/60 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm font-semibold premium-card transition-all duration-250">
        <span class="absolute left-4 top-4.5 text-slate-400">🔍</span>
    </div>

    <!-- Основной терминал ставок -->
    <div class="rounded-3xl overflow-hidden border border-slate-100 dark:border-slate-800/80 mb-6 premium-card shadow-xl">
        
        <!-- Заголовок таблицы -->
        <div class="grid grid-cols-12 bg-slate-50/80 dark:bg-slate-900/40 border-b border-slate-100 dark:border-slate-800/60 p-4 text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500">
            <div class="col-span-6">Направление</div>
            <div class="col-span-3 text-center">3,000 тонн</div>
            <div class="col-span-3 text-center">5-6,000 тонн</div>
        </div>

        <!-- Контейнер для МОРСКИХ СУДОВ -->
        <div id="sea-routes-container" class="divide-y divide-slate-100 dark:divide-slate-800/40"></div>

        <!-- Разделитель БАРЖИ (Премиум градиентный баннер) -->
        <div class="bg-gradient-to-r from-blue-500/10 to-indigo-500/10 dark:from-blue-500/5 dark:to-indigo-500/5 border-y border-blue-500/10 dark:border-blue-500/20 p-4 text-xs font-black text-blue-500 flex items-center justify-between tracking-wide">
            <div class="flex items-center gap-2">
                <span class="text-lg">🌊</span> 
                <span>Barges River Terminal (Речные баржи)</span>
            </div>
            <span class="text-[9px] font-bold bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded-full uppercase tracking-wider">Active</span>
        </div>

        <!-- Контейнер для БАРЖ -->
        <div id="barge-routes-container" class="divide-y divide-slate-100 dark:divide-slate-800/40"></div>
    </div>

    <!-- Кнопка "Скопировать как текст" -->
    <button onclick="copyToClipboardText()" class="w-full py-4 rounded-2xl bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold text-sm shadow-lg shadow-blue-500/20 flex items-center justify-center gap-2.5 transition-all duration-200 active:scale-[0.98]">
        <span>📋</span> Скопировать тарифы как текст
    </button>

    <!-- Тост-уведомление -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 px-6 py-3.5 bg-slate-900/90 dark:bg-slate-100/90 text-white dark:text-slate-900 text-xs font-bold rounded-2xl shadow-2xl opacity-0 pointer-events-none transition-all duration-300 flex items-center gap-2">
        <span>✅</span> Тарифы успешно скопированы в буфер!
    </div>

    <script>
        const FLAGS = {
            "MRM": "🇹🇷 MRM", "ECG": "🇬🇷 ECG", "WCG": "🇬🇷 WCG", "ECI": "🇮🇹 ECI", 
            "WCI": "🇮🇹 WCI", "UK": "🇬🇧 UK", "Benghasi": "🇱🇾 Benghasi", 
            "Creta": "🇬🇷 Creta", "Tunisia": "🇹🇳 Tunisia", "Mersin": "🇹🇷 Mersin", 
            "Egypt": "🇪🇬 Egypt", "CTZ": "🇷🇴 CTZ", "Ruse": "🇧🇬 Ruse"
        };

        const mockHeavy = "MRM:42u:40d,ECG:48d:22u,WCG:56u:26d,ECI:66d:31u,WCI:70u:34d,UK:145d:70u,Benghasi:58u:30d,Creta:55d:25u,Tunisia:60u:28d,Mersin:65u:-,Egypt:68d:-,CTZ:15d:15u,Ruse:15u:15d";
        const mockLight = "MRM:38d:36u,ECG:44u:20d,WCG:52d:24u,ECI:62u:29d,WCI:66d:32u,UK:135u:65d,Benghasi:52d:26u,Creta:50u:22d,Tunisia:55d:24u,Mersin:60u:-,Egypt:62d:-,CTZ:15d:15u,Ruse:15u:15d";

        let currentTab = 'heavy';
        let ratesData = { heavy: [], light: [] };

        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            
            const root = document.documentElement;
            if (tg.themeParams.bg_color) root.style.setProperty('--bg-gradient-start', tg.themeParams.bg_color);
            if (tg.themeParams.secondary_bg_color) {
                root.style.setProperty('--bg-gradient-end', tg.themeParams.secondary_bg_color);
                root.style.setProperty('--card-bg', tg.themeParams.secondary_bg_color);
            }
            if (tg.themeParams.text_color) root.style.setProperty('--text-main', tg.themeParams.text_color);
            if (tg.themeParams.hint_color) root.style.setProperty('--text-muted', tg.themeParams.hint_color);
            if (tg.themeParams.button_color) root.style.setProperty('--accent-color', tg.themeParams.button_color);
        }

        function parseUrlData() {
            const params = new URLSearchParams(window.location.search);
            const dateStr = params.get('d') || "09 июля в 18:00";
            document.getElementById('date-label').innerText = `Обновлено: ${dateStr.replace('_', ' в ')}`;

            const heavyRaw = params.get('h') || mockHeavy;
            const lightRaw = params.get('l') || mockLight;

            ratesData.heavy = decodeRates(heavyRaw);
            ratesData.light = decodeRates(lightRaw);
        }

        function decodeRates(raw) {
            if (!raw) return [];
            return raw.split(',').map(item => {
                const parts = item.split(':');
                const code = parts[0];
                const r3k = parts[1] || '-';
                const r6k = parts[2] || '-';

                const formatCell = (str) => {
                    if (str === '-' || !str) return { price: '-', trend: '', style: 'text-slate-300 dark:text-slate-700 bg-slate-500/5' };
                    let val = str;
                    let trend = '';
                    let style = 'bg-slate-500/10 text-slate-700 dark:text-slate-300'; // Нейтральный по умолчанию
                    
                    const lastChar = str.slice(-1);
                    if (lastChar === 'u' || lastChar === 'd' || lastChar === 'n') {
                        val = str.slice(0, -1);
                        if (lastChar === 'u') {
                            trend = '↑';
                            style = 'bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 border border-emerald-500/10';
                        }
                        if (lastChar === 'd') {
                            trend = '↓';
                            style = 'bg-rose-500/10 text-rose-600 dark:text-rose-400 border border-rose-500/10';
                        }
                    }
                    return { price: `$${val}`, trend, style };
                };

                return {
                    code: code,
                    flag: FLAGS[code] ? FLAGS[code].split(' ')[0] : '🌐',
                    name: FLAGS[code] ? FLAGS[code].split(' ')[1] : code,
                    r3k: formatCell(r3k),
                    r6k: formatCell(r6k)
                };
            });
        }

        function renderTable() {
            const seaContainer = document.getElementById('sea-routes-container');
            const bargeContainer = document.getElementById('barge-routes-container');
            
            seaContainer.innerHTML = '';
            bargeContainer.innerHTML = '';

            const filterText = document.getElementById('search-input').value.toLowerCase();
            const activeRates = ratesData[currentTab];

            activeRates.forEach(item => {
                if (filterText && !item.name.toLowerCase().includes(filterText)) return;

                const isBarge = (item.code === 'CTZ' || item.code === 'Ruse');
                const targetContainer = isBarge ? bargeContainer : seaContainer;

                const row = document.createElement('div');
                row.className = "grid grid-cols-12 p-4 items-center transition duration-150 hover:bg-slate-500/5 dark:hover:bg-slate-400/5";
                
                row.innerHTML = `
                    <!-- Направление -->
                    <div class="col-span-6 flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-xl shadow-inner border border-slate-200/30 dark:border-slate-700/30">
                            ${item.flag}
                        </div>
                        <div>
                            <span class="font-extrabold text-sm tracking-tight text-slate-800 dark:text-slate-100">${item.name}</span>
                            <span class="block text-[9px] font-bold text-slate-400 uppercase tracking-wider">${item.code}</span>
                        </div>
                    </div>
                    
                    <!-- Ставка 3,000 тонн -->
                    <div class="col-span-3 text-center">
                        <span class="inline-flex items-center gap-1 px-3 py-1.5 rounded-xl font-extrabold text-xs shadow-sm ${item.r3k.style}">
                            ${item.r3k.price} <span class="text-[10px] font-black">${item.r3k.trend}</span>
                        </span>
                    </div>
                    
                    <!-- Ставка 5-6,000 тонн -->
                    <div class="col-span-3 text-center">
                        <span class="inline-flex items-center gap-1 px-3 py-1.5 rounded-xl font-extrabold text-xs shadow-sm ${item.r6k.style}">
                            ${item.r6k.price} <span class="text-[10px] font-black">${item.r6k.trend}</span>
                        </span>
                    </div>
                `;
                targetContainer.appendChild(row);
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            const btnHeavy = document.getElementById('btn-heavy');
            const btnLight = document.getElementById('btn-light');

            if (tab === 'heavy') {
                btnHeavy.className = "tab-transition flex-1 py-3 text-center rounded-xl font-bold text-sm flex items-center justify-center gap-2 bg-gradient-to-r from-blue-600 to-indigo-600 text-white shadow-md shadow-blue-500/10 active-glow";
                btnLight.className = "tab-transition flex-1 py-3 text-center rounded-xl font-bold text-sm flex items-center justify-center gap-2 text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-100";
            } else {
                btnLight.className = "tab-transition flex-1 py-3 text-center rounded-xl font-bold text-sm flex items-center justify-center gap-2 bg-gradient-to-r from-blue-600 to-indigo-600 text-white shadow-md shadow-blue-500/10 active-glow";
                btnHeavy.className = "tab-transition flex-1 py-3 text-center rounded-xl font-bold text-sm flex items-center justify-center gap-2 text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-100";
            }

            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
            }

            renderTable();
        }

        function filterRoutes() {
            renderTable();
        }

        function copyToClipboardText() {
            let text = `⚡ Freight Rates — Giurgiulești\n`;
            text += `${currentTab === 'heavy' ? '🚢 ТЯЖЕЛЫЙ ГРУЗ (Heavy)' : '🌾 ЛЕГКИЙ ГРУЗ (Light)'}\n\n`;
            text += `  Route       3,000t     5-6,000t\n`;
            text += `----------------------------------\n`;

            const activeList = ratesData[currentTab];
            
            activeList.forEach(item => {
                if (item.code !== 'CTZ' && item.code !== 'Ruse') {
                    const fullName = `${item.flag} ${item.name}`;
                    const r3kText = `${item.r3k.price}${item.r3k.trend}`.trim();
                    const r6kText = `${item.r6k.price}${item.r6k.trend}`.trim();
                    text += `${fullName.padEnd(12)} ${r3kText.padEnd(10)} ${r6kText}\n`;
                }
            });

            text += `----------------------------------\n`;
            text += `  Barges (Речные баржи)\n`;
            text += `----------------------------------\n`;

            activeList.forEach(item => {
                if (item.code === 'CTZ' || item.code === 'Ruse') {
                    const fullName = `${item.flag} ${item.name}`;
                    const r3kText = `${item.r3k.price}${item.r3k.trend}`.trim();
                    const r6kText = `${item.r6k.price}${item.r6k.trend}`.trim();
                    text += `${fullName.padEnd(12)} ${r3kText.padEnd(10)} ${r6kText}\n`;
                }
            });

            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {
                console.error('Ошибка копирования:', err);
            }
            document.body.removeChild(textarea);
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 2000);
        }

        window.onload = function() {
            parseUrlData();
            renderTable();
        };
    </script>
</body>
</html>
