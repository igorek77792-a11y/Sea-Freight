<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Freight Rates — Giurgiulești Hub</title>
    
    <style>
        /* Премиальная цветовая палитра с автоматической поддержкой темной и светлой темы телефона */
        :root {
            --bg-gradient-start: #f8fafc;
            --bg-gradient-end: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --tab-bg: #e2e8f0;
            --tab-active: #ffffff;
            --tab-active-text: #0f172a;
            --input-bg: #ffffff;
            --shadow: 0 4px 12px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --badge-empty: rgba(0, 0, 0, 0.03);
            --badge-neutral: rgba(94, 109, 131, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-gradient-start: #0f172a;
                --bg-gradient-end: #020617;
                --card-bg: #1e293b;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --border-color: #334155;
                --tab-bg: #0f172a;
                --tab-active: #334155;
                --tab-active-text: #f8fafc;
                --input-bg: #0f172a;
                --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
                --badge-empty: rgba(255, 255, 255, 0.05);
                --badge-neutral: rgba(148, 163, 184, 0.15);
            }
        }

        /* Общие стили */
        body {
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 16px;
            min-height: 100vh;
            -webkit-user-select: none;
            user-select: none;
            box-sizing: border-box;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
        }

        /* Шапка дашборда */
        .header-section {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
            justify-content: space-between;
        }

        .header-title-box {
            display: flex;
            align-items: center;
        }

        .header-logo {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
            margin-right: 12px;
        }

        .main-title {
            font-size: 22px;
            font-weight: 900;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .sub-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 2px;
        }

        .date-badge {
            font-size: 11px;
            font-weight: 800;
            padding: 6px 12px;
            border-radius: 20px;
            background-color: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.15);
        }

        /* Премиум вкладки */
        .tabs-wrapper {
            display: flex;
            background-color: var(--tab-bg);
            padding: 4px;
            border-radius: 14px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .tab-button {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            font-weight: 700;
            font-size: 14px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.25s ease;
        }

        .tab-button.active {
            background-color: var(--tab-active);
            color: var(--tab-active-text);
            box-shadow: var(--shadow);
        }

        /* Поле поиска */
        .search-container {
            position: relative;
            margin-bottom: 20px;
        }

        .search-field {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-main);
            font-size: 14px;
            font-weight: 600;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .search-icon-svg {
            position: absolute;
            left: 16px;
            top: 15px;
            font-size: 15px;
            color: var(--text-muted);
        }

        /* Таблица / Карточка формы */
        .form-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }

        .form-header {
            display: flex;
            padding: 14px 16px;
            background-color: rgba(0, 0, 0, 0.02);
            border-bottom: 1px solid var(--border-color);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .col-dest {
            flex: 6;
        }

        .col-3000 {
            flex: 3;
            text-align: center;
        }

        .col-5000 {
            flex: 3;
            text-align: center;
        }

        .form-row {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.15s;
        }

        .form-row:last-child {
            border-bottom: none;
        }

        .route-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .flag-box {
            font-size: 22px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.03);
            border-radius: 10px;
        }

        .route-title {
            font-weight: 700;
            font-size: 15px;
            letter-spacing: -0.01em;
        }

        .route-sub {
            display: block;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* Стили биржевых бейджей (Крупные и заметные) */
        .badge-rate {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 8px 14px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 14px;
            min-width: 76px;
            box-sizing: border-box;
        }

        .rate-empty {
            background-color: var(--badge-empty);
            color: var(--text-muted);
            font-weight: 600;
        }

        .rate-neutral {
            background-color: var(--badge-neutral);
            color: var(--text-main);
        }

        .rate-up {
            background-color: rgba(16, 185, 129, 0.12);
            color: #059669;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .rate-down {
            background-color: rgba(239, 68, 68, 0.12);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        @media (prefers-color-scheme: dark) {
            .rate-up {
                background-color: rgba(16, 185, 129, 0.18);
                color: #34d399;
            }
            .rate-down {
                background-color: rgba(239, 68, 68, 0.18);
                color: #f87171;
            }
        }

        /* Красивый разделитель для барж */
        .barge-header-banner {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.08) 0%, rgba(99, 102, 241, 0.08) 100%);
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 800;
            color: #3b82f6;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .barge-banner-tag {
            font-size: 9px;
            font-weight: 900;
            background-color: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        /* Кнопка */
        .submit-btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: #ffffff;
            font-weight: 700;
            font-size: 15px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
            transition: transform 0.1s, opacity 0.2s;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        /* Тост-уведомление */
        .toast-box {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #0f172a;
            color: #ffffff;
            font-size: 13px;
            font-weight: 700;
            padding: 12px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 9999;
        }
        
        @media (prefers-color-scheme: dark) {
            .toast-box {
                background-color: #f8fafc;
                color: #0f172a;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Шапка -->
        <div class="header-section">
            <div class="header-title-box">
                <div class="header-logo">🚢</div>
                <div>
                    <h1 class="main-title">Freight Rates</h1>
                    <div class="sub-title">Giurgiulești Hub</div>
                </div>
            </div>
            <div id="date-label" class="date-badge">Загрузка...</div>
        </div>

        <!-- Переключатель грузов -->
        <div class="tabs-wrapper">
            <button id="btn-heavy" onclick="switchTab('heavy')" class="tab-button active">
                <span>🚢</span> Тяжелый груз
            </button>
            <button id="btn-light" onclick="switchTab('light')" class="tab-button">
                <span>🌾</span> Легкий груз
            </button>
        </div>

        <!-- Поиск -->
        <div class="search-container">
            <span class="search-icon-svg">🔍</span>
            <input type="text" id="search-input" oninput="filterRoutes()" placeholder="Быстрый поиск направления..." class="search-field">
        </div>

        <!-- Сетка и Форма -->
        <div class="form-card">
            
            <!-- Заголовки колонок -->
            <div class="form-header">
                <div class="col-dest">Направление</div>
                <div class="col-3000">3,000 тонн</div>
                <div class="col-5000">5-6,000 тонн</div>
            </div>

            <!-- Контейнер для МОРСКИХ СУДОВ -->
            <div id="sea-routes-container"></div>

            <!-- Разделитель БАРЖИ -->
            <div class="barge-header-banner">
                <div style="display: flex; align-items: center; gap: 6px;">
                    <span>🌊</span> 
                    <span>Barges River Terminal (Баржи)</span>
                </div>
                <span class="barge-banner-tag">Active</span>
            </div>

            <!-- Контейнер для БАРЖ -->
            <div id="barge-routes-container"></div>
        </div>

        <!-- Кнопка -->
        <button onclick="copyToClipboardText()" class="submit-btn">
            <span>📋</span> Скопировать ставки как текст
        </button>

    </div>

    <!-- Тост -->
    <div id="toast" class="toast-box">
        <span>✅</span> Ставки успешно скопированы в буфер!
    </div>

    <script>
        const FLAGS = {
            "MRM": "🇹🇷 MRM", "ECG": "🇬🇷 ECG", "WCG": "🇬🇷 WCG", "ECI": "🇮🇹 ECI", 
            "WCI": "🇮🇹 WCI", "UK": "🇬🇧 UK", "Benghasi": "🇱🇾 Benghasi", 
            "Creta": "🇬🇷 Creta", "Tunisia": "🇹🇳 Tunisia", "Mersin": "🇹🇷 Mersin", 
            "Egypt": "🇪🇬 Egypt", "CTZ": "🇷🇴 CTZ", "Ruse": "🇧🇬 Ruse"
        };

        // Демо-данные по умолчанию
        const mockHeavy = "MRM:42u:40d,ECG:48d:22u,WCG:56u:26d,ECI:66d:31u,WCI:70u:34d,UK:145d:70u,Benghasi:58u:30d,Creta:55d:25u,Tunisia:60u:28d,Mersin:65u:-,Egypt:68d:-,CTZ:15d:15u,Ruse:15u:15d";
        const mockLight = "MRM:38d:36u,ECG:44u:20d,WCG:52d:24u,ECI:62u:29d,WCI:66d:32u,UK:135u:65d,Benghasi:52d:26u,Creta:50u:22d,Tunisia:55d:24u,Mersin:60u:-,Egypt:62d:-,CTZ:15d:15u,Ruse:15u:15d";

        let currentTab = 'heavy';
        let ratesData = { heavy: [], light: [] };

        function parseUrlData() {
            const params = new URLSearchParams(window.location.search);
            const dateStr = params.get('d') || "09 июля в 18:00";
            document.getElementById('date-label').innerText = `Обновлено: ${dateStr.replace('_', ' в ')}`;

            const heavyRaw = params.get('h') || mockHeavy;
            const lightRaw = params.get('l') || mockLight;

            ratesData.heavy = decodeRates(heavyRaw);
            ratesData.light = decodeRates(lightRaw);
        }

        function decodeRates(raw) {
            if (!raw) return [];
            return raw.split(',').map(item => {
                const parts = item.split(':');
                const code = parts[0];
                const r3k = parts[1] || '-';
                const r6k = parts[2] || '-';

                const formatCell = (str) => {
                    if (str === '-' || !str) return { price: '-', trend: '', style: 'rate-empty' };
                    let val = str;
                    let trend = '';
                    let style = 'rate-neutral';
                    
                    const lastChar = str.slice(-1);
                    if (lastChar === 'u' || lastChar === 'd' || lastChar === 'n') {
                        val = str.slice(0, -1);
                        if (lastChar === 'u') {
                            trend = '↑';
                            style = 'rate-up';
                        }
                        if (lastChar === 'd') {
                            trend = '↓';
                            style = 'rate-down';
                        }
                    }
                    return { price: `$${val}`, trend, style };
                };

                return {
                    code: code,
                    flag: FLAGS[code] ? FLAGS[code].split(' ')[0] : '🌐',
                    name: FLAGS[code] ? FLAGS[code].split(' ')[1] : code,
                    r3k: formatCell(r3k),
                    r6k: formatCell(r6k)
                };
            });
        }

        function renderTable() {
            const seaContainer = document.getElementById('sea-routes-container');
            const bargeContainer = document.getElementById('barge-routes-container');
            
            seaContainer.innerHTML = '';
            bargeContainer.innerHTML = '';

            const filterText = document.getElementById('search-input').value.toLowerCase();
            const activeRates = ratesData[currentTab];

            activeRates.forEach(item => {
                if (filterText && !item.name.toLowerCase().includes(filterText)) return;

                const isBarge = (item.code === 'CTZ' || item.code === 'Ruse');
                const targetContainer = isBarge ? bargeContainer : seaContainer;

                const row = document.createElement('div');
                row.className = "form-row";
                
                row.innerHTML = `
                    <div class="col-dest route-cell">
                        <div class="flag-box">${item.flag}</div>
                        <div>
                            <span class="route-title">${item.name}</span>
                            <span class="route-sub">${item.code}</span>
                        </div>
                    </div>
                    <div class="col-3000">
                        <span class="badge-rate ${item.r3k.style}">
                            ${item.r3k.price} <span>${item.r3k.trend}</span>
                        </span>
                    </div>
                    <div class="col-5000">
                        <span class="badge-rate ${item.r6k.style}">
                            ${item.r6k.price} <span>${item.r6k.trend}</span>
                        </span>
                    </div>
                `;
                targetContainer.appendChild(row);
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            const btnHeavy = document.getElementById('btn-heavy');
            const btnLight = document.getElementById('btn-light');

            if (tab === 'heavy') {
                btnHeavy.className = "tab-button active";
                btnLight.className = "tab-button";
            } else {
                btnLight.className = "tab-button active";
                btnHeavy.className = "tab-button";
            }

            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
            }

            renderTable();
        }

        function filterRoutes() {
            renderTable();
        }

        function copyToClipboardText() {
            let text = `⚡ Freight Rates — Giurgiulești\n`;
            text += `${currentTab === 'heavy' ? '🚢 ТЯЖЕЛЫЙ ГРУЗ (Heavy)' : '🌾 ЛЕГКИЙ ГРУЗ (Light)'}\n\n`;
            text += `  Route       3,000t     5-6,000t\n`;
            text += `----------------------------------\n`;

            const activeList = ratesData[currentTab];
            
            activeList.forEach(item => {
                if (item.code !== 'CTZ' && item.code !== 'Ruse') {
                    const fullName = `${item.flag} ${item.name}`;
                    const r3kText = `${item.r3k.price}${item.r3k.trend}`.trim();
                    const r6kText = `${item.r6k.price}${item.r6k.trend}`.trim();
                    text += `${fullName.padEnd(12)} ${r3kText.padEnd(10)} ${r6kText}\n`;
                }
            });

            text += `----------------------------------\n`;
            text += `  Barges (Речные баржи)\n`;
            text += `----------------------------------\n`;

            activeList.forEach(item => {
                if (item.code === 'CTZ' || item.code === 'Ruse') {
                    const fullName = `${item.flag} ${item.name}`;
                    const r3kText = `${item.r3k.price}${item.r3k.trend}`.trim();
                    const r6kText = `${item.r6k.price}${item.r6k.trend}`.trim();
                    text += `${fullName.padEnd(12)} ${r3kText.padEnd(10)} ${r6kText}\n`;
                }
            });

            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {
                console.error('Ошибка копирования:', err);
            }
            document.body.removeChild(textarea);
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 2000);
        }

        window.onload = function() {
            parseUrlData();
            renderTable();
        };
    </script>
</body>
</html>
