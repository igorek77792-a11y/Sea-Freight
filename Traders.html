<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Freight Rates — Giurgiulești</title>
    <!-- Подключаем Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root {
            --tg-bg: #f4f6f9;
            --tg-card-bg: #ffffff;
            --tg-text: #1f2937;
            --tg-border: #e5e7eb;
            --tg-accent: #2563eb;
        }
        body {
            background-color: var(--tg-bg);
            color: var(--tg-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        .custom-card {
            background-color: var(--tg-card-bg);
            border: 1px solid var(--tg-border);
        }
        .tab-transition {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="p-4 min-h-screen">

    <!-- Шапка -->
    <!-- -->
    <div class="mb-5 text-center">
        <h1 class="text-xl font-black tracking-tight">📊 Freight Rates</h1>
        <p class="text-[10px] font-bold text-gray-400 mt-1 uppercase tracking-wider" id="date-label">Загрузка...</p>
    </div>

    <!-- Переключатель типа груза -->
    <div class="flex p-1 rounded-xl bg-gray-200/70 mb-5 custom-card">
        <button id="btn-heavy" onclick="switchTab('heavy')" class="tab-transition flex-1 py-2.5 text-center rounded-lg font-bold text-xs flex items-center justify-center gap-1 bg-white text-gray-800 shadow-sm">
            🚢 Heavy (Тяжелый)
        </button>
        <button id="btn-light" onclick="switchTab('light')" class="tab-transition flex-1 py-2.5 text-center rounded-lg font-bold text-xs flex items-center justify-center gap-1 text-gray-500 hover:text-gray-800">
            🌾 Light (Легкий)
        </button>
    </div>

    <!-- Быстрый поиск -->
    <div class="mb-4 relative">
        <input type="text" id="search-input" oninput="filterRoutes()" placeholder="🔍 Быстрый поиск направления..." 
               class="w-full pl-9 pr-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 text-xs font-bold custom-card">
    </div>

    <!-- Таблица ставок -->
    <!-- -->
    <div class="rounded-2xl overflow-hidden shadow-sm border border-gray-100 mb-6 custom-card">
        
        <!-- Заголовок таблицы -->
        <div class="grid grid-cols-12 bg-gray-50/70 border-b border-gray-100 p-3 text-[10px] font-black uppercase tracking-wider text-gray-400">
            <div class="col-span-6">Направление</div>
            <div class="col-span-3 text-center">3,000t</div>
            <div class="col-span-3 text-center">5-6,000t</div>
        </div>

        <!-- Раздел: Морские суда -->
        <div id="sea-routes-container" class="divide-y divide-gray-100"></div>

        <!-- Раздел: Речные баржи -->
        <div class="bg-blue-50/40 border-y border-blue-100/50 p-2.5 px-4 text-[11px] font-black text-blue-600 uppercase tracking-wider">
            🌾 Речные баржи (Barges)
        </div>
        <div id="barge-routes-container" class="divide-y divide-gray-100"></div>
    </div>

    <!-- Кнопка "Скопировать как текст" -->
    <!-- -->
    <button onclick="copyToClipboardText()" class="w-full py-4 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm shadow-md flex items-center justify-center gap-2 transition duration-200 active:scale-[0.98]">
        📋 Скопировать тарифы текстом
    </button>

    <!-- Всплывающее уведомление -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 px-5 py-3 bg-black/80 text-white text-xs font-bold rounded-xl shadow-lg opacity-0 pointer-events-none transition-opacity duration-300 flex items-center gap-2">
        <span>✅</span> Ставки скопированы!
    </div>

    <!-- -->
    <script>
        const FLAGS = {
            "CTZ": "🇷🇴 CTZ",
            "Ruse": "🇧🇬 Ruse",
            "MRM": "🇹🇷 MRM",
            "ECG": "🇬🇷 ECG",
            "Creta": "🇬🇷 Creta",
            "WCG": "🇬🇷 WCG",
            "Mersin": "🇹🇷 Mersin",
            "Egypt": "🇪🇬 Egypt",
            "ECI": "🇮🇹 ECI",
            "Benghasi": "🇱🇾 Benghasi",
            "WCI": "🇮🇹 WCI",
            "Tunisia": "🇹🇳 Tunisia",
            "UK": "🇬🇧 UK"
        };

        // Демо-данные по умолчанию
        const mockHeavy = "CTZ:15u:15d,Ruse:15u:15d,MRM:42u:40d,ECG:48d:22u,Creta:55d:25u,WCG:56u:26d,Mersin:65u:-,Egypt:68d:-,ECI:66d:31u,Benghasi:58u:30d,WCI:70u:34d,Tunisia:60u:28d,UK:145d:70u";
        const mockLight = "CTZ:15d:15u,Ruse:15u:15d,MRM:38d:36u,ECG:44u:20d,Creta:50u:22d,WCG:52d:24u,Mersin:60u:-,Egypt:62d:-,ECI:62u:29d,Benghasi:52d:26u,WCI:66d:32u,Tunisia:55d:24u,UK:135u:65d";

        let currentTab = 'heavy';
        let ratesData = { heavy: [], light: [] };

        // Инициализируем Telegram WebApp
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            
            const root = document.documentElement;
            if (tg.themeParams.bg_color) root.style.setProperty('--tg-bg', tg.themeParams.bg_color);
            if (tg.themeParams.secondary_bg_color) root.style.setProperty('--tg-card-bg', tg.themeParams.secondary_bg_color);
            if (tg.themeParams.text_color) root.style.setProperty('--tg-text', tg.themeParams.text_color);
            if (tg.themeParams.section_separator_color) root.style.setProperty('--tg-border', tg.themeParams.section_separator_color);
        }

        // Парсинг переданных тарифов из URL
        function parseUrlData() {
            const params = new URLSearchParams(window.location.search);
            const dateStr = params.get('d') || "09.07_18:00";
            
            document.getElementById('date-label').innerText = `📅 ОБНОВЛЕНО: ${dateStr.replace('_', ' В ')}`;

            const heavyRaw = params.get('h') || mockHeavy;
            const lightRaw = params.get('l') || mockLight;

            ratesData.heavy = decodeRates(heavyRaw);
            ratesData.light = decodeRates(lightRaw);
        }

        // Декодер строки в объекты с покраской трендов!
        function decodeRates(raw) {
            return raw.split(',').map(item => {
                const parts = item.split(':');
                const code = parts[0];
                const r3 = parts[1] || '-';
                const r6 = parts[2] || '-';

                // Функция покраски ставки в зависимости от тренда
                // Если вверх (u) -> Красная (рост цен). Если вниз (d) -> Зеленая (скидка)
                const formatCell = (valStr) => {
                    if (valStr === '-' || !valStr) return { price: '—', trend: '', style: 'text-gray-300' };
                    
                    const value = valStr.slice(0, -1);
                    const trendCode = valStr.slice(-1);
                    
                    if (trendCode === 'u') {
                        return { price: `$${value}`, trend: ' 🔺', style: 'text-red-600 bg-red-50/70 border border-red-100 rounded-lg px-2 py-0.5' };
                    } else if (trendCode === 'd') {
                        return { price: `$${value}`, trend: ' 🔻', style: 'text-green-600 bg-green-50/70 border border-green-100 rounded-lg px-2 py-0.5' };
                    }
                    return { price: `$${value}`, trend: '', style: 'text-gray-800' };
                };

                return {
                    code: code,
                    flag: FLAGS[code] ? FLAGS[code].split(' ')[0] : '🌐',
                    name: FLAGS[code] ? FLAGS[code].split(' ')[1] : code,
                    r3k: formatCell(r3),
                    r6k: formatCell(r6)
                };
            });
        }

        // Отрисовка таблиц
        function renderTable() {
            const seaContainer = document.getElementById('sea-routes-container');
            const bargeContainer = document.getElementById('barge-routes-container');
            
            seaContainer.innerHTML = '';
            bargeContainer.innerHTML = '';

            const filterText = document.getElementById('search-input').value.toLowerCase();
            const activeList = ratesData[currentTab];

            activeList.forEach(item => {
                if (filterText && !item.name.toLowerCase().includes(filterText)) return;

                const isBarge = (item.code === 'CTZ' || item.code === 'Ruse');
                const targetContainer = isBarge ? bargeContainer : seaContainer;

                const row = document.createElement('div');
                row.className = "grid grid-cols-12 p-3.5 items-center hover:bg-gray-50/50 transition duration-150";
                row.innerHTML = `
                    <div class="col-span-6 flex items-center gap-2">
                        <span class="text-lg">${item.flag}</span>
                        <span class="font-extrabold text-xs tracking-wide">${item.name}</span>
                    </div>
                    <div class="col-span-3 text-center font-black text-sm">
                        <span class="${item.r3k.style}">${item.r3k.price}<span class="text-[9px]">${item.r3k.trend}</span></span>
                    </div>
                    <div class="col-span-3 text-center font-black text-sm">
                        <span class="${item.r6k.style}">${item.r6k.price}<span class="text-[9px]">${item.r6k.trend}</span></span>
                    </div>
                `;
                targetContainer.appendChild(row);
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            const btnHeavy = document.getElementById('btn-heavy');
            const btnLight = document.getElementById('btn-light');

            if (tab === 'heavy') {
                btnHeavy.className = "tab-transition flex-1 py-2.5 text-center rounded-lg font-bold text-xs flex items-center justify-center gap-1 bg-white text-gray-800 shadow-sm";
                btnLight.className = "tab-transition flex-1 py-2.5 text-center rounded-lg font-bold text-xs flex items-center justify-center gap-1 text-gray-500 hover:text-gray-800";
            } else {
                btnLight.className = "tab-transition flex-1 py-2.5 text-center rounded-lg font-bold text-xs flex items-center justify-center gap-1 bg-white text-gray-800 shadow-sm";
                btnHeavy.className = "tab-transition flex-1 py-2.5 text-center rounded-lg font-bold text-xs flex items-center justify-center gap-1 text-gray-500 hover:text-gray-800";
            }

            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
            }

            renderTable();
        }

        function filterRoutes() {
            renderTable();
        }

        // Копирование в буфер
        function copyToClipboardText() {
            let text = `⚡ Freight Rates — Giurgiulești\n`;
            text += `${currentTab === 'heavy' ? '🚢 ТЯЖЕЛЫЙ ГРУЗ (Heavy)' : '🌾 ЛЕГКИЙ ГРУЗ (Light)'}\n\n`;
            text += `  Route       3,000t     5-6,000t\n`;
            text += `----------------------------------\n`;

            const activeList = ratesData[currentTab];
            
            // Сначала суда
            activeList.forEach(item => {
                if (item.code !== 'CTZ' && item.code !== 'Ruse') {
                    const fullName = `${item.flag} ${item.name}`;
                    const r3kText = `${item.r3k.price}${item.r3k.trend}`.trim();
                    const r6kText = `${item.r6k.price}${item.r6k.trend}`.trim();
                    text += `${fullName.padEnd(12)} ${r3kText.padEnd(10)} ${r6kText}\n`;
                }
            });

            text += `----------------------------------\n`;
            text += `  Barges (Речные баржи)\n`;
            text += `----------------------------------\n`;

            // Затем баржи
            activeList.forEach(item => {
                if (item.code === 'CTZ' || item.code === 'Ruse') {
                    const fullName = `${item.flag} ${item.name}`;
                    const r3kText = `${item.r3k.price}${item.r3k.trend}`.trim();
                    const r6kText = `${item.r6k.price}${item.r6k.trend}`.trim();
                    text += `${fullName.padEnd(12)} ${r3kText.padEnd(10)} ${r6kText}\n`;
                }
            });

            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);

            const toast = document.getElementById('toast');
            toast.className = toast.className.replace('opacity-0 pointer-events-none', 'opacity-100');
            setTimeout(() => {
                toast.className = toast.className.replace('opacity-100', 'opacity-0 pointer-events-none');
            }, 2000);
        }

        window.onload = function() {
            parseUrlData();
            renderTable();
        };
    </script>
</body>
</html>
